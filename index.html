<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Blood on the Clocktower Soundtrack</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="app" aria-labelledby="app-title">
      <header class="topbar">
        <div>
          <p class="game-title">Blood on the Clocktower</p>
          <h1 id="app-title">Soundtrack</h1>
        </div>
        <div class="stage-indicator" data-active-stage>Idle</div>
        <button class="settings-button" type="button" data-settings-open aria-label="Open audio settings">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"></path>
            <path d="M19.4 15a1.8 1.8 0 0 0 .36 1.98l.04.04a2 2 0 0 1-2.82 2.82l-.04-.04A1.8 1.8 0 0 0 14.96 19a1.8 1.8 0 0 0-1.08 1.64V20.8a2 2 0 0 1-4 0v-.06A1.8 1.8 0 0 0 8.8 19a1.8 1.8 0 0 0-1.98.36l-.04.04a2 2 0 0 1-2.82-2.82l.04-.04A1.8 1.8 0 0 0 4.36 15a1.8 1.8 0 0 0-1.64-1.08H2.6a2 2 0 0 1 0-4h.12A1.8 1.8 0 0 0 4.36 8a1.8 1.8 0 0 0-.36-1.98l-.04-.04A2 2 0 0 1 6.78 3.16l.04.04A1.8 1.8 0 0 0 8.8 3.56a1.8 1.8 0 0 0 1.08-1.64V1.8a2 2 0 0 1 4 0v.12a1.8 1.8 0 0 0 1.08 1.64 1.8 1.8 0 0 0 1.98-.36l.04-.04a2 2 0 0 1 2.82 2.82l-.04.04A1.8 1.8 0 0 0 19.4 8a1.8 1.8 0 0 0 1.64 1.08h.16a2 2 0 0 1 0 4h-.16A1.8 1.8 0 0 0 19.4 15Z"></path>
          </svg>
        </button>
      </header>

      <div class="master-volume-rail" data-master-volume-rail>
        <label class="volume-control master-volume-control">
          <span class="volume-control-label">Master</span>
          <input
            class="volume-slider"
            type="range"
            min="0"
            max="100"
            step="1"
            value="80"
            data-volume-slider="master"
            aria-label="Master volume"
          >
          <span class="volume-value" data-volume-value="master">80%</span>
        </label>
      </div>

      <section class="stage-controls" aria-label="Game stage controls">
        <button class="stage-button" type="button" data-stage="setup" aria-pressed="false">
          <span class="stage-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M8.4 8.2h7.2"></path>
              <path d="M9.2 8.2 6.8 6.3"></path>
              <path d="m14.8 8.2 2.4-1.9"></path>
              <path d="M8.4 8.2 6.8 19.4c-.1.9.6 1.6 1.5 1.6h7.4c.9 0 1.6-.7 1.5-1.6L15.6 8.2"></path>
              <path d="M9.3 13.1c1.5.8 3.9.8 5.4 0"></path>
              <path d="M10.2 8.1c.2-1.8 3.4-1.8 3.6 0"></path>
            </svg>
          </span>
          <span class="stage-name">SETUP</span>
          <span class="stage-state" data-stage-state="setup">Loading</span>
          <span class="stage-loop-meter" data-loop-meter="setup" aria-hidden="true">
            <span class="stage-loop-meter-fill" data-loop-meter-fill></span>
          </span>
        </button>

        <button class="stage-button" type="button" data-stage="day" aria-pressed="false">
          <span class="stage-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <circle cx="12" cy="12" r="4"></circle>
              <path d="M12 2v3"></path>
              <path d="M12 19v3"></path>
              <path d="m4.93 4.93 2.12 2.12"></path>
              <path d="m16.95 16.95 2.12 2.12"></path>
              <path d="M2 12h3"></path>
              <path d="M19 12h3"></path>
              <path d="m4.93 19.07 2.12-2.12"></path>
              <path d="m16.95 7.05 2.12-2.12"></path>
            </svg>
          </span>
          <span class="stage-name">DAY</span>
          <span class="stage-state" data-stage-state="day">Loading</span>
          <span class="stage-loop-meter" data-loop-meter="day" aria-hidden="true">
            <span class="stage-loop-meter-fill" data-loop-meter-fill></span>
          </span>
        </button>

        <button class="stage-button" type="button" data-stage="nominations" aria-pressed="false">
          <span class="stage-icon stage-icon-nominations" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M10.5 3.5a2 2 0 0 1 4 0v7.1l.35-.35a2 2 0 0 1 2.83 0l2.57 2.57c.48.48.75 1.13.75 1.81V17a5 5 0 0 1-5 5h-3.3a6 6 0 0 1-4.24-1.76l-3.28-3.28a2 2 0 1 1 2.83-2.83l2.49 2.49V3.5Z"></path>
              <path d="M14.5 10.6V14"></path>
              <path d="M17 10.5V14"></path>
              <path d="M10.5 16.6V3.5"></path>
            </svg>
          </span>
          <span class="stage-name">NOMINATIONS</span>
          <span class="stage-state" data-stage-state="nominations">Loading</span>
          <span class="stage-loop-meter" data-loop-meter="nominations" aria-hidden="true">
            <span class="stage-loop-meter-fill" data-loop-meter-fill></span>
          </span>
        </button>

        <button class="stage-button" type="button" data-stage="night" aria-pressed="false">
          <span class="stage-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M20 14.4A7.5 7.5 0 0 1 9.6 4a8.2 8.2 0 1 0 10.4 10.4Z"></path>
            </svg>
          </span>
          <span class="stage-name">NIGHT</span>
          <span class="stage-state" data-stage-state="night">Loading</span>
          <span class="stage-loop-meter" data-loop-meter="night" aria-hidden="true">
            <span class="stage-loop-meter-fill" data-loop-meter-fill></span>
          </span>
        </button>
      </section>

      <footer class="transport">
        <div
          class="preload-progress"
          data-preload-progress
          role="progressbar"
          aria-label="Audio preload progress"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-valuenow="0"
        >
          <div class="preload-progress-fill" data-preload-progress-fill></div>
        </div>
        <button class="stop-button" type="button" data-stop disabled>Stop All</button>
        <p class="status-line" data-status role="status" aria-live="polite">Preloading audio files...</p>
      </footer>
    </main>

    <section
      class="settings-modal"
      data-settings-modal
      role="dialog"
      aria-modal="true"
      aria-labelledby="settings-title"
      hidden
    >
      <div class="settings-sheet">
        <header class="settings-header">
          <h2 id="settings-title">Audio Settings</h2>
          <button class="settings-close-button" type="button" data-settings-close aria-label="Close audio settings">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="m6 6 12 12"></path>
              <path d="M18 6 6 18"></path>
            </svg>
          </button>
        </header>
        <label class="settings-checkbox-row">
          <input
            class="settings-checkbox"
            type="checkbox"
            data-loop-progress-toggle
          >
          <span class="settings-checkbox-label">Show Loop Progress</span>
        </label>
        <div class="settings-track-list" data-track-volume-list></div>
      </div>
    </section>
  </body>
</html>
